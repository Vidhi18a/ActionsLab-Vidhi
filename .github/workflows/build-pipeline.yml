name: Build and Test Pipeline - Vidhi Shah

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Starting build process
        run: echo "Starting build process..."

      - name: Simulate compilation
        run: sleep 3

      - name: Build completed
        run: echo "Build completed successfully"

      - name: Build author
        run: echo "Built by Vidhi Shah"

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Run tests
        run: echo "Running automated tests..."

      - name: Simulate test execution
        run: sleep 2

      - name: Print date
        run: date

      - name: Test result
        run: echo "All tests passed for Vidhi Shah"